<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #ffe6f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box{
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            width: 300px;
            text-align: center;
        }

        h1{
            color: #ff4da6;
            margin-bottom: 20px;
        }

        input{
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 2px solid #ffb3d9;
            border-radius: 8px;
            outline: none;
        }

        input:focus{
            border-color: #ff4da6;
        }

        button{
            background-color: #ff4da6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover{
            background-color: #e60073;
        }

        .erro{
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>SEJA BEM VINDO!</h1>

        <form method="POST">
            <input type="text" name="usuario" placeholder="Usuário" required>

            <input type="password" name="senha" placeholder="Senha" required>

            <button type="submit">Entrar</button>
        </form>

        <p class="erro">{{ erro }}</p>
    </div>

</body>
</html>
